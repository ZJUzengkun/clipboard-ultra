name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  # 缓存构建：main push 时只编译不发布，暖缓存供 tag 构建使用
  cache-build:
    if: github.ref_type == 'branch'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-macos-aarch64

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Rust (cache warming)
        run: cd src-tauri && cargo build --release --target aarch64-apple-darwin
        env:
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: '0'
        continue-on-error: true

  # 正式发布：tag push 时创建 Release 并上传产物
  create-release:
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `Clipboard Pro ${context.ref.replace('refs/tags/', '')}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false
            });
            return data.id;

  build:
    if: github.ref_type == 'tag'
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend build output
        run: |
          npm run build
          echo "=== dist directory contents ==="
          ls -la dist/ || dir dist
          echo "=== checking settings.html ==="
          cat dist/settings.html | head -20 || type dist\settings.html

      - name: Import code signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo $CERTIFICATE_BASE64 | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings build.keychain
          security import /tmp/cert.p12 -k build.keychain -P $CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          security add-trusted-cert -d -r trustRoot -p codeSign -k build.keychain /tmp/cert.pem 2>/dev/null || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: '0'
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Sign app bundle
        if: matrix.platform == 'macos-latest' && steps.tauri-build.outcome == 'success'
        timeout-minutes: 2
        continue-on-error: true
        run: |
          # 重新解锁 keychain（防止构建耗时过长导致 keychain 自动上锁）
          security unlock-keychain -p actions build.keychain
          codesign --force --deep --sign "Clipboard Ultra Dev" src-tauri/target/aarch64-apple-darwin/release/bundle/macos/clipboard-ultra.app

      - name: Build Tauri app (fallback without sccache)
        if: steps.tauri-build.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_INCREMENTAL: '1'
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
