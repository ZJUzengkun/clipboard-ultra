name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  # 缓存构建：main push 时只编译不发布，暖缓存供 tag 构建使用
  cache-build:
    if: github.ref_type == 'branch'
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-macos-aarch64

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Rust (cache warming)
        run: cd src-tauri && cargo build --release --target aarch64-apple-darwin
        env:
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: '0'
        continue-on-error: true

  # 正式发布：tag push 时创建 Release 并上传产物
  create-release:
    if: github.ref_type == 'tag'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - name: Create Release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            // 幂等：仅删除同名的 draft 旧 release（保护已发布的正式 release），避免 already_exists 冲突
            try {
              const { data: existing } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              if (existing.draft) {
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: existing.id,
                });
              } else {
                throw new Error(`Release ${tag} 已正式发布，拒绝覆盖。如需重发请先手动删除该 release。`);
              }
            } catch (e) {
              if (e.status !== 404) throw e; // 404=不存在则忽略；其他错误（含上面的拒绝覆盖）向上抛出
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Clipboard Ultra ${tag}`,
              body: 'See the assets to download and install this version.',
              draft: false,
              prerelease: false
            });
            return data.id;

  build:
    if: github.ref_type == 'tag'
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true
          shared-key: release-${{ matrix.platform }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Import code signing certificate
        if: matrix.platform == 'macos-latest'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security list-keychains -d user -s build.keychain login.keychain-db
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          # 自签名证书在全新 keychain 中默认不被 codesigning 策略视为有效，需显式信任为根
          security find-certificate -c "Clipboard Ultra Dev" -p build.keychain > /tmp/cert-pub.pem
          sudo security add-trusted-cert -d -r trustRoot -p codeSign -k /Library/Keychains/System.keychain /tmp/cert-pub.pem
          echo "=== 可用签名身份（信任后）==="
          security find-identity -v -p codesigning

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri-build
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCCACHE_GHA_ENABLED: 'true'
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: '0'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PWD }}
          APPLE_SIGNING_IDENTITY: Clipboard Ultra Dev
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

      - name: Build Tauri app (fallback without sccache)
        if: steps.tauri-build.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_INCREMENTAL: '1'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_KEY_PWD }}
          APPLE_SIGNING_IDENTITY: Clipboard Ultra Dev
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
