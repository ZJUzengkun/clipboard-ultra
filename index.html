<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/logo.svg" />
    <title>Tauri + Solid + Typescript App</title>
    <script>
      // 首帧应用已保存主题，避免闪烁（与 src/theme.ts 的 localStorage 约定一致）
      (function () {
        try {
          var choice = localStorage.getItem("cu-theme") || "system";
          var id, mode;
          if (choice === "system") {
            mode = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
            id = localStorage.getItem(mode === "light" ? "cu-last-light" : "cu-last-dark") || mode;
          } else {
            id = choice;
            var cache = (localStorage.getItem("cu-theme-cache") || "").split("|");
            mode = cache[0] === choice && cache[1] ? cache[1] : "dark";
          }
          document.documentElement.setAttribute("data-theme", id);
          document.documentElement.setAttribute("data-mode", mode);
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script src="/src/index.tsx" type="module"></script>
  </body>
</html>
